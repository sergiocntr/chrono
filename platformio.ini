; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = src_crono
;src_dir = test_DHT22

; Ambiente di default per sviluppo
default_envs = esp32c3

; Configurazione comune
[common]
build_flags = 
    -DPROJECT_VERSION='"2.1.0"'
    -DUSE_NEXTION=1
    -Dversione=157
	-I/media/progetti_ext/PROJECT/configPlat
	-I/media/progetti_ext/PROJECT/libs

lib_deps = 
	milesburton/DallasTemperature@^4.0.4
	adafruit/Adafruit Unified Sensor@^1.1.5
	adafruit/DHT sensor library@^1.4.4
	djgrrr/Int64String@^1.1.1
	bblanchon/ArduinoJson@5.13.4
	knolleary/PubSubClient@^2.8
	beegee-tokyo/DHT sensor library for ESPx @ ^1.19

[env:nodemcuv2]
platform = espressif8266
board = d1
framework = arduino
lib_deps = 
    ${common.lib_deps}
    IRremoteESP8266@^2.8.6
    ESP8266WiFi
    ESP8266HTTPUpdateServer


build_flags = 
    ${common.build_flags}
    -DESP8266_BUILD=1
    -DDHT_PIN=2
    -DIR_PIN=14
    -DNEXTION_RX=4
    -DNEXTION_TX=5

	-D versione=156

; Environment ESP32-C3 (nuovo)
[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Configurazione specifica ESP32-C3
board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.partitions = default.csv
; Librerie specifiche ESP32
lib_deps = 
    ${common.lib_deps}
    IRremote@^4.2.0
    WiFi
    HTTPUpdateServer
    Update
    PubSubClient@^2.8

build_flags = 
    ${common.build_flags}
    -DESP32_BUILD=1
    -DDHT_PIN=4
    -DIR_PIN=6
    -DNEXTION_USE_HARDWARE_SERIAL=1
